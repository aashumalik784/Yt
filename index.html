<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Ideas Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-3xl mx-auto p-4 md:p-6">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12s0 3.93.502 5.814a3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                <h1 class="text-2xl md:text-3xl font-bold">YT Ideas Pro</h1>
            </div>
            <div id="stats" class="text-sm text-zinc-400"></div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="ideaInput" placeholder="Naya video idea likho..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="addBtn" onclick="addIdea()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-semibold">Add Idea</button>
            </div>
        </div>

        <div id="ideasList" class="space-y-3">
            <div class="text-center text-zinc-500 py-10">Loading ideas...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gsquihgpzhlxnusxnumi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_08n3oC03aTEMvwxZ3pbcpw_Fiqv6iCs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allIdeas = [];

        document.getElementById('ideaInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addIdea();
        });

        loadIdeas();

        async function loadIdeas() {
            const { data, error } = await supabase.from('ideas').select('*').order('created_at', { ascending: false });
            if (error) {
                document.getElementById('ideasList').innerHTML = `<div class="text-center text-red-500 py-10">Error: ${error.message}</div>`;
                console.log('Supabase Error:', error);
                return;
            }
            allIdeas = data || [];
            renderIdeas();
        }

        function renderIdeas() {
            document.getElementById('stats').textContent = `${allIdeas.length} Total Ideas`;
            if (allIdeas.length === 0) {
                document.getElementById('ideasList').innerHTML = '<div class="text-center text-zinc-500 py-10">Koi idea nahi hai. Pehla add karo 👆</div>';
                return;
            }
            document.getElementById('ideasList').innerHTML = allIdeas.map(idea => `
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 flex items-start gap-3">
                    <div class="flex-1">
                        <div class="font-medium mb-1">${escapeHtml(idea.title)}</div>
                        <div class="text-xs text-zinc-500">${new Date(idea.created_at).toLocaleString('en-IN')}</div>
                    </div>
                    <button onclick="deleteIdea(${idea.id})" class="text-zinc-500 hover:text-red-500 p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        async function addIdea() {
            const title = document.getElementById('ideaInput').value.trim();
            if (!title) return;
            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            btn.textContent = 'Adding...';
            const { error } = await supabase.from('ideas').insert([{ title }]);
            if (error) {
                alert('Error: ' + error.message);
                console.log(error);
            } else {
                document.getElementById('ideaInput').value = '';
                await loadIdeas();
            }
            btn.disabled = false;
            btn.textContent = 'Add Idea';
        }

        async function deleteIdea(id) {
            if (!confirm('Pakka delete karna hai?')) return;
            await supabase.from('ideas').delete().eq('id', id);
            await loadIdeas();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
