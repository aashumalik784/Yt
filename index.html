<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Idea Saver</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { 
            font-size: 24px; 
            margin-bottom: 20px; 
            text-align: center;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            background: #272727;
            border: 1px solid #3f3f3f;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #065fd4;
        }
        button {
            padding: 12px 24px;
            background: #065fd4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        button:active { background: #0550b0; }
        button:disabled { 
            background: #3f3f3f; 
            cursor: not-allowed;
        }
        #ideasList {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .idea-item {
            background: #272727;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #3f3f3f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .idea-text { flex: 1; }
        .delete-btn {
            background: #cc0000;
            padding: 6px 12px;
            font-size: 14px;
            margin-left: 12px;
        }
        .delete-btn:active { background: #990000; }
        .empty {
            text-align: center;
            color: #aaa;
            padding: 40px 20px;
        }
        .loading {
            text-align: center;
            color: #aaa;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>🎥 YouTube Ideas</h1>
    
    <div class="input-group">
        <input type="text" id="ideaInput" placeholder="Naya idea likho..." autocomplete="off">
        <button id="addBtn" onclick="addIdea()">Add</button>
    </div>

    <div id="ideasList" class="loading">Loading ideas...</div>

    <script>
        const SUPABASE_URL = 'https://gsquihgpzhlxnusxnumi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzcXVpaGdwemhseG51c3hudW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjI3NDUsImV4cCI6MjA5NDMzODc0NX0.CGAPpE10sJ09SmrCwuE0lotGvAvwzBN4Z1B_6Jn3U-k';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const ideaInput = document.getElementById('ideaInput');
        const addBtn = document.getElementById('addBtn');
        const ideasList = document.getElementById('ideasList');

        loadIdeas();

        ideaInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addIdea();
        });

        async function loadIdeas() {
            const { data, error } = await supabase
                .from('ideas')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                ideasList.innerHTML = `<div class="empty">Error: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                ideasList.innerHTML = '<div class="empty">Koi idea nahi hai. Pehla idea add karo 👆</div>';
                return;
            }

            ideasList.innerHTML = data.map(idea => `
                <div class="idea-item">
                    <div class="idea-text">${escapeHtml(idea.title)}</div>
                    <button class="delete-btn" onclick="deleteIdea(${idea.id})">Delete</button>
                </div>
            `).join('');
        }

        async function addIdea() {
            const title = ideaInput.value.trim();
            if (!title) return;

            addBtn.disabled = true;
            addBtn.textContent = 'Adding...';

            const { error } = await supabase
                .from('ideas')
                .insert([{ title: title }]);

            if (error) {
                alert('Error: ' + error.message);
            } else {
                ideaInput.value = '';
                await loadIdeas();
            }

            addBtn.disabled = false;
            addBtn.textContent = 'Add';
            ideaInput.focus();
        }

        async function deleteIdea(id) {
            if (!confirm('Ye idea delete kar du?')) return;

            const { error } = await supabase
                .from('ideas')
                .delete()
                .eq('id', id);

            if (error) {
                alert('Error: ' + error.message);
            } else {
                await loadIdeas();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
