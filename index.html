<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aashu YT Ideas v2</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: #0f0f0f; 
      color: #fff; 
      padding: 20px; 
      max-width: 600px; 
      margin: 0 auto; 
    }
    h1 { color: #ff0000; text-align: center; }
    .box { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    input, button { 
      width: 100%; 
      padding: 14px; 
      margin: 8px 0; 
      border-radius: 8px; 
      border: 1px solid #333; 
      background: #212121; 
      color: #fff; 
      font-size: 16px;
      box-sizing: border-box;
    }
    button { 
      background: #ff0000; 
      font-weight: bold; 
      cursor: pointer; 
      border: none;
    }
    button:active { opacity: 0.8; }
    .idea { 
      background: #212121; 
      padding: 15px; 
      margin: 10px 0; 
      border-radius: 8px; 
      border-left: 3px solid #ff0000;
      word-break: break-word;
    }
    .loading { text-align: center; opacity: 0.6; }
    .error { background: #3d1a1a; padding: 15px; border-radius: 8px; color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>🔥 Aashu YT Ideas v2</h1>
  
  <div class="box">
    <input type="text" id="title" placeholder="Video Title Likho...">
    <button onclick="addIdea()">Save Kar Do</button>
  </div>
  
  <div id="list" class="loading">Loading...</div>

  <script>
    // === BAS YE 2 LINE CHANGE KARNI HAI NAYE PROJECT KE BAAD ===
    const SUPABASE_URL = 'PASTE_YOUR_NEW_PROJECT_URL_HERE';
    const SUPABASE_KEY = 'PASTE_YOUR_NEW_ANON_KEY_HERE';
    // ==========================================================
    
    const API_URL = SUPABASE_URL + '/rest/v1/aashu_yt';
    
    async function loadIdeas() {
      const listDiv = document.getElementById('list');
      listDiv.className = 'loading';
      listDiv.innerHTML = 'Loading...';
      
      try {
        const res = await fetch(API_URL + '?select=*&order=created_at.desc', {
          headers: { 
            'apikey': SUPABASE_KEY, 
            'Authorization': 'Bearer ' + SUPABASE_KEY 
          }
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || 'Server se data nahi aaya');
        }
        
        const data = await res.json();
        if (data.length === 0) {
          listDiv.innerHTML = '<div class="idea">Pehla idea daal bhai! 👆</div>';
          return;
        }
        
        listDiv.className = '';
        listDiv.innerHTML = data.map(x => 
          `<div class="idea">${x.aashu_yt}</div>`
        ).join('');
        
      } catch (err) {
        listDiv.className = 'error';
        listDiv.innerHTML = 'Error: ' + err.message + '<br><br>Check karo: 1. URL-Key sahi hai? 2. RLS OFF hai? 3. Table name aashu_yt hai?';
      }
    }
    
    async function addIdea() {
      const input = document.getElementById('title');
      const title = input.value.trim();
      if (!title) return alert('Bhai title to daal');
      
      const btn = event.target;
      btn.disabled = true;
      btn.innerText = 'Saving...';
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 
            'apikey': SUPABASE_KEY, 
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ aashu_yt: title })
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || 'Save nahi hua');
        }
        
        input.value = '';
        await loadIdeas();
        
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerText = 'Save Kar Do';
      }
    }
    
    // Enter dabane se bhi save ho jaye
    document.getElementById('title').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addIdea();
    });
    
    loadIdeas();
  </script>
</body>
</html>
